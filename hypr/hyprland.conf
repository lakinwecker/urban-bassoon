# Hyprland config (shared across all hosts)
# Adapted from lakinwecker/dots
# Note: hyprgrass plugin + touch gesture config is appended on Surface only
# (see hypr/default.nix and hypr/hyprgrass.conf).

monitor=eDP-1,preferred,auto,2,transform,0
monitor=,preferred,auto,2

input {
    repeat_rate=100
    repeat_delay=250

    follow_mouse=2

    touchpad {
        natural_scroll=yes
        tap-to-click=no
    }

    touchdevice {
        enabled=true
    }
}

dwindle {
    special_scale_factor=0.91
    pseudotile=0
}

general {
    gaps_in=4
    gaps_out=4
    border_size=2
    col.active_border=0xffd7827e
    col.inactive_border=0xff286983
}

decoration {
    rounding=8
    inactive_opacity=1.0
    active_opacity=1.0
}

animations {
    enabled=1
}


misc {
    disable_hyprland_logo=true
}

exec-once=iio-hyprland eDP-1
exec-once=hyprctl setcursor Bibata-Modern-Classic 20
exec-once=hypridle
exec-once=awww-daemon && sleep 1 && awww img /etc/wallpaper.jpg
exec-once=hyprpolkitagent
exec-once=hyprpanel

# windowrulev2 = noblur, title:^(.*)(Firefox)$
# windowrulev2 = opaque, title:^(.*)(Firefox)$

# Mac-style universal copy/paste. Copy & paste use X11 legacy keys
# (Ctrl+Insert / Shift+Insert) which work in both terminals and GUI apps.
bindd=SUPER,C,Universal copy,sendshortcut,CTRL,Insert,
bindd=SUPER,V,Universal paste,sendshortcut,SHIFT,Insert,
bind=SUPER,X,exec,/etc/hypr/scripts/mac-shortcut.sh cut
bind=SUPER,A,exec,/etc/hypr/scripts/mac-shortcut.sh select-all
bind=SUPER,Z,exec,/etc/hypr/scripts/mac-shortcut.sh undo
bind=SUPERSHIFT,Z,exec,/etc/hypr/scripts/mac-shortcut.sh redo

bind=SUPERSHIFT,T,exec,/etc/user-bin/theme-toggle

bind=SUPER,Return,exec,ghostty
bind=SUPERSHIFT,Q,killactive,
bind=SUPERSHIFT,E,exit,
bind=SUPER,E,togglegroup
bind=SUPERSHIFT,V,togglefloating,
bind=SUPER,space,exec,nwg-drawer -c 7 -is 64 -s /etc/hypr/nwg-drawer.css
bind=SUPER,D,exec,rofi -show drun -theme /etc/hypr/rofi-tokyonight.rasi
bind=CTRLSUPERSHIFT,l,exec,hyprlock
bind=SUPER,P,pseudo,
bind=SUPER,F,fullscreen,1
bind=SUPER,h,movefocus,l
bind=SUPER,l,movefocus,r
bind=SUPER,k,movefocus,u
bind=SUPER,j,movefocus,d

# Workspaces
bind=SUPER,1,workspace,1
bind=SUPER,2,workspace,2
bind=SUPER,3,workspace,3
bind=SUPER,4,workspace,4
bind=SUPER,5,workspace,5
bind=SUPER,6,workspace,6
bind=SUPER,7,workspace,7
bind=SUPER,8,workspace,8
bind=SUPER,9,workspace,9
bind=SUPER,0,workspace,10
bind=SUPER,grave,togglespecialworkspace

bind=SUPERSHIFT,1,movetoworkspacesilent,1
bind=SUPERSHIFT,2,movetoworkspacesilent,2
bind=SUPERSHIFT,3,movetoworkspacesilent,3
bind=SUPERSHIFT,4,movetoworkspacesilent,4
bind=SUPERSHIFT,5,movetoworkspacesilent,5
bind=SUPERSHIFT,6,movetoworkspacesilent,6
bind=SUPERSHIFT,7,movetoworkspacesilent,7
bind=SUPERSHIFT,8,movetoworkspacesilent,8
bind=SUPERSHIFT,9,movetoworkspacesilent,9
bind=SUPERSHIFT,0,movetoworkspacesilent,10
bind=SUPERSHIFT,space,movetoworkspace,special

# RESIZING
bind=SUPER,r,submap,resize
submap=resize
binde=,right,resizeactive,2 0
binde=,left,resizeactive,-2 0
binde=,up,resizeactive,0 -2
binde=,down,resizeactive,0 2
binde=,l,resizeactive,2 0
binde=,h,resizeactive,-2 0
binde=,j,resizeactive,0 -2
binde=,k,resizeactive,0 2
binde=SHIFT,right,resizeactive,20 0
binde=SHIFT,left,resizeactive,-20 0
binde=SHIFT,up,resizeactive,0 -20
binde=SHIFT,down,resizeactive,0 20
binde=SHIFT,l,resizeactive,20 0
binde=SHIFT,h,resizeactive,-20 0
binde=SHIFT,j,resizeactive,0 -20
binde=SHIFT,k,resizeactive,0 20
bind=,escape,submap,reset
submap=reset

bind=SUPERSHIFT,l,movewindow,r
bind=SUPERSHIFT,h,movewindow,l
bind=SUPERSHIFT,j,movewindow,d
bind=SUPERSHIFT,k,movewindow,u

bind=SUPER,mouse_down,workspace,e+1
bind=SUPER,mouse_up,workspace,e-1
bindm=SUPER,mouse:272,movewindow
bindm=SUPER,mouse:273,resizewindow

bind=,XF86AudioRaiseVolume,exec,wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+
bind=,XF86AudioLowerVolume,exec,wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bind=,XF86AudioMute,exec,wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bind=,XF86AudioMicMute,exec,wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bind=,XF86MonBrightnessDown,exec,brightnessctl set 5%-
bind=,XF86MonBrightnessUp,exec,brightnessctl set 5%+
bind=,Print,exec,grimblast --notify copy area
bind=,XF86AudioPlay,exec,playerctl play-pause
bind=,XF86AudioNext,exec,playerctl next
bind=,XF86AudioPrev,exec,playerctl previous

